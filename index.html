<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<style>
  :root{
    --ink: rgb(40,40,40);        /* index list + general copy */
    --ink-strong: rgb(0,0,0);    /* hover-reveal metadata */
    --link-active: #0000EE;      /* selected item */
    --font: -apple-system, system-ui, "Segoe UI", Roboto, Ubuntu, Arial, sans-serif;

    --col-left: 8%;              /* left column: intro + nav (the red third) */
    --panel-w: 440px;            /* width of the content column */
    --col-right: calc((1133px - var(--panel-w)) / 2);  /* content column, centered in the 1133px canvas → centered in the window (the green third) */
    --preview-w: 480px;
    --preview-h: 270px;          /* 16:9 */

    /* flip-card faces — About / Contact get a coloured back the same size as
       the cover photo, so the content area reads as a deck of cards */
    --card-h: 293px;             /* = cover photo height at 440px wide (2304×1536 → 3:2) */
    --card-about: #2f5241;       /* muted forest green */
    --card-contact: #7c4a3a;     /* muted terracotta */
    --card-ink: #f2ede3;         /* light copy on the coloured faces */
  }

  *{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin: 0;
    background: #fff;
    color: var(--ink);
    font: 400 13px/1.2 var(--font);
    overflow: hidden;            /* single screen, no scroll */
    display: flex;               /* center the fixed-width canvas in the window */
    justify-content: center;
    align-items: flex-start;
  }

  /* fixed-proportion canvas: the whole layout lives here and scales down
     uniformly as the window shrinks, instead of reflowing/colliding */
  .frame{
    position: relative;
    width: 1133px;
    height: 760px;
    flex: none;                  /* keep full 1133px layout box; only transform scales it */
    transform-origin: top center;
    transform: scale(var(--s, 1));
  }
  a{ color: inherit; text-decoration: none; }
  a:hover{ color: var(--link-active); }

  /* ---- left column: media preview (hidden until hover) ---- */
  .stage{
    position: absolute; left: var(--col-left); top: 130px;
    width: var(--preview-w); height: var(--preview-h);
  }
  .preview{
    position: absolute; inset: 0;
    opacity: 0; transition: opacity .18s ease;   /* simple fade, nothing else */
    pointer-events: none;
  }
  .preview.is-active{ opacity: 1; }
  .preview img,
  .preview video,
  .preview .ph{ width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph{
    background: #ededed; color: #8a8a8a;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  /* ---- left column: metadata (hidden until hover) ---- */
  .meta{
    position: absolute; left: var(--col-left); top: 412px; width: var(--preview-w);
  }
  .meta .m{
    position: absolute; top: 0; left: 0;
    opacity: 0; transition: opacity .18s ease;
    color: var(--ink-strong);
  }
  .meta .m.is-active{ opacity: 1; }
  .meta .m p{ margin: 0 0 4px; line-height: 1.25; }

  /* ---- left column: permanent copy ---- */
  /* left-column nav: lives OUTSIDE the canvas so it can center in the window's
     LEFT THIRD (a viewport concept, not a canvas one), while still scaling with
     --s. transform-origin top-center keeps it pinned to the third's centre at
     any scale; the box is the full third wide and the text is centred in it.
     padding-top lifts the nav up into the empty band beside the cover photo so
     its block sits vertically centred on the photo (photo center ≈ 283px), not
     stranded down near the page bottom. */
  .intro{
    position: fixed; top: 0; left: 0;
    width: 33.333vw;                 /* the red third */
    padding-top: 226px;              /* sit beside the photo, vertically centred on it */
    text-align: center;              /* centre the nav within the third */
    line-height: 1.4;
    transform: scale(var(--s, 1));
    transform-origin: top center;
    pointer-events: none;            /* the transparent box doesn't catch clicks… */
  }
  .intro p{ margin: 0 0 14px; }
  .intro a{ pointer-events: auto; }  /* …but the nav links do */

  /* ---- live clock: sits above the photo, centered over the right-hand
         content column. Lives INSIDE .frame so it scales with the design and
         tracks the same column as the cover / about / contact content. ---- */
  .clockbar{ position: absolute; top: 40px; left: var(--col-right); width: var(--panel-w); text-align: center; pointer-events: none; }
  .clockbar .clock{ display: inline-block; }

  /* ---- bottom footer: icon row (white background, ink-colored) ---- */
  .footer{
    position: fixed; right: 40px; bottom: 40px;
    transform: scale(var(--s, 1)); transform-origin: bottom right;
    display: flex; align-items: center; gap: 1px;
  }
  /* each slot stacks a light (default) + dark (hover) version, cross-faded */
  .ic-slot{ position: relative; width: 28px; height: 28px; display: block; }
  .ic-slot .ic{
    position: absolute; inset: 0; width: 28px; height: 28px;
    fill: var(--ink); display: block;
    transition: opacity .18s ease;
  }
  .ic-slot .ic-dark{ opacity: 0; }
  .ic-slot:hover .ic-light{ opacity: 0; }
  .ic-slot:hover .ic-dark{ opacity: 1; }

  /* ---- right column: swappable content panel (home / about / contact) ----
     The three views share ONE flip-card. Clicking a tab rotates the card
     edge-on (rotateX 90°), swaps the visible face while it's invisible, then
     rotates the new face back in — so the content area reads as a card deck.
     perspective on the panel gives the rotation its 3-D depth. */
  .panel{ position: absolute; left: var(--col-right); top: 136px; width: var(--panel-w); perspective: 1600px; }

  .card{
    position: relative;
    width: 100%;
    height: var(--card-h);           /* every face is the photo's footprint */
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* faces stack on top of each other; only the active one is shown */
  .view{ position: absolute; inset: 0; display: none; }
  .view.is-active{ display: block; }
  .about.is-active,
  .contact.is-active{ display: flex; flex-direction: column; justify-content: center; }

  /* HOME face — the cover photo fills the whole card */
  .cover{ display: block; width: 100%; height: 100%; object-fit: cover; margin: 0; }

  /* ABOUT / CONTACT faces — coloured backs, light copy, same size as the photo */
  .about, .contact{ padding: 30px 34px; color: var(--card-ink); }
  .about{ background: var(--card-about); }
  .contact{ background: var(--card-contact); }
  .about p{ margin: 0; line-height: 1.55; color: inherit; }
  .contact-lead{ margin: 0 0 10px; line-height: 1.5; color: inherit; }   /* gap between phone + schedule */
  .about a, .contact a{ color: inherit; }
  .about a:hover, .contact a:hover{ color: #fff; text-decoration: underline; }

  /* project index — sits below the card, shown only on Home (empty until you add work) */
  .index{ margin-top: 14px; }
  .panel:not([data-cur="home"]) .index{ display: none; }
  .index ul{ list-style: none; margin: 0; padding: 0; }
  .index li{ line-height: 13px; white-space: nowrap; }   /* extremely tight */
  .index [data-i]{ display: block; cursor: pointer; }
  .index span[data-i]{ cursor: default; }                /* non-linked items */
  .index [data-i]:hover,
  .index [data-i].is-active{ color: var(--link-active); }

  /* active section in the left-column nav */
  .intro a.is-active{ color: var(--link-active); }

  /* ============================================================
   * MOBILE / SMALL SCREENS
   * The desktop "scale-to-fit canvas" shrinks 13px text to ~4px on a
   * phone, so on small screens we abandon the fixed canvas entirely and
   * reflow into one readable, scrollable column:
   *     clock  ->  intro + nav  ->  project index  ->  icons
   * The media test covers portrait phones (<=700px wide) AND landscape
   * phones (short + not-too-wide). Anything larger keeps the desktop design.
   * ============================================================ */
  @media (max-width: 700px), (max-width: 950px) and (max-height: 600px){
    html, body{ height: auto; }
    body{
      overflow: visible;                 /* re-enable vertical scrolling */
      display: flex; flex-direction: column;
      justify-content: flex-start;       /* override desktop centering */
      align-items: stretch;              /* keep stacked blocks full-width */
      min-height: 100vh;
      padding: 28px 24px 32px;
      font-size: 16px;                   /* readable base size */
      -webkit-text-size-adjust: 100%;    /* stop iOS auto-inflating text */
    }

    /* clock: top of the page, in normal flow, centered, unscaled */
    .clockbar{
      order: 0;
      position: static; left: auto; width: auto;
      text-align: center; margin: 0 0 40px;
    }
    .clockbar .clock{ font-size: 16px; }

    /* canvas box dissolves so its children (clock, panel) join the body's flex
       column directly; the order:* values below sequence them with the nav and
       icons → clock, nav, content, icons */
    .frame{ display: contents; }

    /* the hover-reveal preview + metadata don't exist on touch, so hide
       them here (they're also empty until you add projects) */
    .stage, .meta{ display: none; }

    /* the two desktop columns become stacked, full-width blocks */
    .intro{
      order: 1;
      position: static; left: auto; top: auto; width: auto;
      padding-top: 0; transform: none; text-align: left; pointer-events: auto;
      line-height: 1.6; margin: 0 0 32px;
    }
    .intro p{ margin: 0 0 16px; }

    .panel{ order: 2; position: static; left: auto; top: auto; width: auto; perspective: none; }
    /* dissolve the flip-card on touch: faces flow as plain stacked blocks —
       no 3-D, no coloured backs — preserving the approved mobile reading view */
    .card{ width: auto; height: auto; transform: none; transform-style: flat; }
    .view{ position: static; }
    .cover{ height: auto; }
    .about, .contact{ background: none; color: inherit; padding: 0; }
    .about.is-active, .contact.is-active{ display: block; }
    .index{ position: static; left: auto; top: auto; margin-top: 0; }
    .index li{ line-height: 2; white-space: normal; }   /* wrap + tap-friendly */
    .about p{ max-width: none; }

    /* icons: bottom of the page, in flow, unscaled, left-aligned */
    .footer{
      order: 3; position: static; transform: none;
      justify-content: flex-start;
      margin-top: auto; padding-top: 40px;   /* sit at the bottom */
    }
  }
</style>
</head>

<script>
  /* ============================================================
   * PORTFOLIO CONTENT  —  this is the only part you edit to add work.
   * ------------------------------------------------------------
   * Each entry below becomes one line in the right-hand index.
   * Hovering it reveals the media on the left plus three metadata
   * lines (title / description / credit).
   *
   * To add a piece:
   *   1. Put the file in the  media/  folder  (e.g. media/my_film.mp4).
   *   2. Add an entry to the array using the shape below.
   *
   * Entry shape:
   *   {
   *     file:   "My_Project_Name.mp4",  // text shown in the index list
   *     linked: true,                    // true = link, false = plain text
   *     href:   "#",                     // optional URL to open on click
   *     title:  "My Project — Full Title",
   *     log:    "One-line description of the work.",
   *     credit: "Your role / credit line.",
   *     media:  { type: "video", src: "media/my_film.mp4" }  // or type:"image"
   *   }
   * Omit `media` to show a neutral placeholder frame instead.
   * ============================================================ */
  const projects = [
    // (empty for now — upload your work and entries get added here)
  ];

  const stage = document.getElementById("stage");
  const metaWrap = document.getElementById("meta");
  const list = document.getElementById("list");
  const nav = document.getElementById("nav");

  projects.forEach((p, i) => {
    // ---- preview (stacked in the stage) ----
    const prev = document.createElement("div");
    prev.className = "preview";
    if (p.media && p.media.type === "image" && p.media.src) {
      const img = document.createElement("img");
      img.src = p.media.src; img.alt = p.title; img.loading = "eager";
      prev.appendChild(img);
    } else if (p.media && p.media.type === "video" && p.media.src) {
      const v = document.createElement("video");
      v.src = p.media.src; v.muted = true; v.loop = true; v.playsInline = true; v.preload = "auto";
      prev.appendChild(v);
    } else {
      const ph = document.createElement("div");
      ph.className = "ph"; ph.textContent = p.file;
      prev.appendChild(ph);
    }
    stage.appendChild(prev);

    // ---- metadata (stacked below the stage) ----
    const m = document.createElement("div");
    m.className = "m";
    const t = document.createElement("p"); t.textContent = p.title;
    const l = document.createElement("p"); l.textContent = p.log;
    const c = document.createElement("p"); c.textContent = p.credit;
    m.append(t, l, c);
    metaWrap.appendChild(m);

    // ---- index list item ----
    const li = document.createElement("li");
    const el = document.createElement(p.linked ? "a" : "span");
    if (p.linked) el.href = p.href || "#";
    el.textContent = p.file;
    el.dataset.i = i;
    li.appendChild(el);
    list.appendChild(li);

    el.addEventListener("mouseenter", () => setActive(i));
    el.addEventListener("focus", () => setActive(i));
  });

  const previews = [...stage.children];
  const metas = [...metaWrap.children];
  const items = [...list.querySelectorAll("[data-i]")];

  function setActive(i) {
    previews.forEach((p, idx) => p.classList.toggle("is-active", idx === i));
    metas.forEach((m, idx) => m.classList.toggle("is-active", idx === i));
    items.forEach((it) => it.classList.toggle("is-active", Number(it.dataset.i) === i));
    const v = previews[i].querySelector("video");
    if (v) { v.currentTime = 0; v.play().catch(() => {}); }
  }

  function clearActive() {
    previews.forEach((p) => p.classList.remove("is-active"));
    metas.forEach((m) => m.classList.remove("is-active"));
    items.forEach((it) => it.classList.remove("is-active"));
    document.querySelectorAll("video").forEach((v) => v.pause());
  }

  // blank out when the pointer leaves the index entirely (lets moving
  // between items cross-fade instead of flashing to empty)
  list.addEventListener("mouseleave", clearActive);
  nav.addEventListener("focusout", (e) => {
    if (!nav.contains(e.relatedTarget)) clearActive();
  });

  // ---- scale the whole frame to fit the window ----
  // matches the .frame dimensions in CSS; never scales above 1:1
  const DESIGN_W = 1133, DESIGN_H = 760;
  function fit() {
    const s = Math.min(1, window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
    document.documentElement.style.setProperty("--s", s);
  }
  window.addEventListener("resize", fit);
  window.addEventListener("orientationchange", fit);
  fit();

  // ---- live clock (replaces the old index heading) ----
  const clock = document.getElementById("clock");
  const pad = (n) => String(n).padStart(2, "0");
  function tick() {
    const d = new Date();
    clock.textContent = pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }
  tick();
  setInterval(tick, 1000);

  // ---- section views (home / about / contact) ----
  // The left-column links swap which block shows in the right-hand panel.
  // Hash-based so views are deep-linkable (#about, #contact) and the
  // browser back button works. "Home" (href="#") returns to the default.
  const navLinks = [...document.querySelectorAll(".intro [data-nav]")];
  const views = [...document.querySelectorAll(".view[data-view]")];
  const viewNames = new Set(views.map((v) => v.dataset.view));
  const panel = document.getElementById("panel");
  const card = document.getElementById("card");

  const FLIP_MS = 208;   // half-flip duration (a full turn is 2×)
  const smallScreen = () =>
    window.matchMedia("(max-width: 700px), (max-width: 950px) and (max-height: 600px)").matches;
  const reduceMotion = () =>
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  let current = null, busy = false, queued = null;

  // paint = swap which face + nav link is active (no animation)
  function paint(name) {
    views.forEach((v) => v.classList.toggle("is-active", v.dataset.view === name));
    navLinks.forEach((a) => a.classList.toggle("is-active", a.dataset.nav === name));
    panel.dataset.cur = name;
    current = name;
  }

  // half-flip out (0→90°, edge-on/invisible), swap the face, half-flip in (−90→0°)
  // rotateX = spin around the horizontal axis, so the card folds top-over-bottom
  function flip(name) {
    busy = true;
    card.style.transition = "transform " + FLIP_MS + "ms cubic-bezier(.4,0,1,1)";
    card.style.transform = "rotateX(90deg)";
    setTimeout(() => {
      paint(name);                              // swap while the card is edge-on
      card.style.transition = "none";
      card.style.transform = "rotateX(-90deg)";
      void card.offsetWidth;                    // commit the jump before easing back
      card.style.transition = "transform " + FLIP_MS + "ms cubic-bezier(0,0,.2,1)";
      card.style.transform = "rotateX(0deg)";
      setTimeout(() => {
        card.style.transition = "";
        card.style.transform = "";
        busy = false;
        if (queued && queued !== current) { const q = queued; queued = null; flip(q); }
        else queued = null;
      }, FLIP_MS);
    }, FLIP_MS);
  }

  function showView(name, animate) {
    const target = viewNames.has(name) ? name : "home";
    if (!animate || smallScreen() || reduceMotion()) { paint(target); return; }
    if (target === current) return;             // already on this face — no flip
    if (busy) { queued = target; return; }      // mid-flip — remember the latest request
    flip(target);
  }

  function routeFromHash() {
    showView((location.hash || "").replace(/^#/, "").toLowerCase(), true);
  }
  window.addEventListener("hashchange", routeFromHash);

  // initial load paints the starting face without a flip
  showView((location.hash || "").replace(/^#/, "").toLowerCase(), false);

  // (A contact submission form will be wired up later with a real backend.)
</script>
</body>
</html>
